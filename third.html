<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Gurren Lagann Mecha</title>

    <style>

        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        h1 {
            margin-top: 40px;
            font-size: 40px;
        }

        #mecha {
            width: 500px;
            margin-top: 50px;
            transition: 0.5s;
        }

            #mecha:hover {
                transform: scale(1.1);
            }

        button {
            margin: 20px;
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(45deg,#ff0033,#ffcc00);
        }

            button:hover {
                transform: scale(1.1);
            }
    </style>
</head>

<body>

    <!-- МУЗЫКА -->
    <audio autoplay loop>
        <source src="music/spiral_music.mp3" type="audio/mpeg">
    </audio>

    <h1>Эпическая меха</h1>

    <img id="mecha" src="Images/kamina.png">

    <br>

    <button onclick="window.location.href='main.html'">
        Назад
    </button>

    <button onclick="window.location.href='final.html'">
        Финал
    </button>

    <canvas id="stars"></canvas>

    <script>

        const canvas = document.getElementById("stars");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];

        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2
            });
        }

        function drawStars() {

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "white";

            for (let star of stars) {
                ctx.fillRect(star.x, star.y, star.size, star.size);

                star.y += 0.3;

                if (star.y > canvas.height) {
                    star.y = 0;
                }
            }

            requestAnimationFrame(drawStars);

        }

        drawStars();

    </script>

</body>
</html>
